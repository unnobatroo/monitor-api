name: ci

on:
  push:
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall app migrations

  java-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compile java sensor
        run: javac java_sensor/src/SensorClient.java

  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler and curl dev package
        run: sudo apt-get update && sudo apt-get install -y g++ libcurl4-openssl-dev

      - name: Compile cpp sensor
        run: g++ -std=c++17 -O2 -Wall -Wextra -o /tmp/cpp_sensor cpp_sensor/src/main.cpp -lcurl
