services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=grid_db
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  cpp_sensor:
    build:
      context: ./cpp_sensor
    environment:
      - API_BASE_URL=http://api:8000
      - SENSOR_NODE_ID=1
      - SEND_INTERVAL_SECONDS=8
    depends_on:
      - api
    restart: unless-stopped

  java_sensor:
    build:
      context: ./java_sensor
    environment:
      - API_BASE_URL=http://api:8000
      - SENSOR_NODE_ID=1
      - SEND_INTERVAL_SECONDS=10
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data: